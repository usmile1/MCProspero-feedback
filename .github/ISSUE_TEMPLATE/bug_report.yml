name: Bug Report
description: Something isn't working right
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the issue. What did you expect to happen?
      placeholder: Tell us what went wrong...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. I asked Claude to...
        2. The agent was supposed to...
        3. Instead, it...
    validations:
      required: false
  - type: dropdown
    id: client
    attributes:
      label: Which MCP client are you using?
      options:
        - Claude Desktop
        - claude.ai (web)
        - Claude Mobile
        - ChatGPT
        - Cursor
        - Other
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, error messages, agent details — anything that might help.
    validations:
      required: false
